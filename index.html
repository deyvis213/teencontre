<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teencontre | La Red de Servicios Profesionales de RD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0f172a;
            --brand-accent: #2563eb;
            --client-color: #6366f1;
            --ai-purple: #a855f7;
            --white: #ffffff;
            --bg-gray: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-gray); color: var(--text-main); line-height: 1.6; }

        header { 
            background: linear-gradient(135deg, var(--brand-blue) 0%, #1e293b 100%); 
            color: var(--white); 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--brand-accent);
        }
        
        header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        header p { font-size: 1.1rem; opacity: 0.9; font-weight: 300; }

        .main-layout { 
            max-width: 1300px; 
            margin: -40px auto 60px; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
        }

        .full { grid-column: span 2; }

        .card { 
            background: var(--white); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: var(--shadow-lg); 
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.3s ease;
        }

        .card-header { 
            border-bottom: 2px solid var(--bg-gray); 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h2 { font-size: 1.4rem; font-weight: 700; color: var(--brand-blue); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            background: #f8fafc; 
            font-size: 1rem; 
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus, select:focus { border-color: var(--brand-accent); outline: none; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.3s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-client { background: var(--client-color); color: white; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); }
        .btn-client:hover { background: #4f46e5; transform: translateY(-2px); }

        .btn-provider { background: var(--brand-accent); color: white; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4); }
        .btn-provider:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* AI BOX */
        .ai-box { 
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); 
            border-left: 6px solid var(--ai-purple); 
            padding: 25px; 
            border-radius: 16px; 
            margin-bottom: 30px; 
            display: none; 
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-badge { 
            background: var(--ai-purple); 
            color: white; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            display: inline-block;
            margin-bottom: 12px;
        }

        .ai-content { font-size: 1rem; color: #4c1d95; line-height: 1.7; }

        /* RESULTS */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .result-item { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-top: 4px solid var(--brand-accent);
            padding: 25px; 
            border-radius: 16px; 
            transition: all 0.3s ease;
            position: relative;
        }
        .result-item:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .result-item h3 { font-size: 1.25rem; margin-bottom: 8px; color: var(--brand-blue); }
        .result-item .meta { font-size: 0.9rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .result-item .contact-btn { 
            margin-top: 15px; 
            padding: 10px; 
            background: #22c55e; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 600;
            font-size: 0.9rem;
        }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<header>
    <h1>Teencontre</h1>
    <p>Directorio Inteligente de Profesionales y Oficios en República Dominicana</p>
</header>

<div class="main-layout">
    <section class="card">
        <div class="card-header"><h2>🔎 Buscar un Servicio</h2></div>
        <div class="form-grid">
            <div class="field">
                <label>¿En qué provincia?</label>
                <select id="cli-provincia"></select>
            </div>
            <div class="field">
                <label>¿Qué servicio buscas?</label>
                <select id="cli-area"></select>
            </div>
            <div class="full field">
                <label>Ubicación Específica (Opcional)</label>
                <input type="text" id="cli-dir" placeholder="Sector, calle o referencia (Ej: Naco, Villa Mella)">
            </div>
            <div class="full">
                <button class="btn-client" onclick="app.ejecutarBusquedaInteligente()">
                    Consultar Asistente IA
                </button>
            </div>
        </div>
    </section>

    <section class="card">
        <div class="card-header"><h2>🛠 Ofrecer mi Servicio</h2></div>
        <div class="form-grid">
            <div class="full field">
                <label>Nombre del Negocio o Profesional</label>
                <input type="text" id="pro-nombre" placeholder="Nombre completo">
            </div>
            <div class="field">
                <label>Provincia</label>
                <select id="pro-provincia"></select>
            </div>
            <div class="field">
                <label>Especialidad</label>
                <select id="pro-area"></select>
            </div>
            <div class="full field">
                <label>Dirección del Local o Taller</label>
                <input type="text" id="pro-dir" placeholder="Ej: Calle 16 de Agosto #45">
            </div>
            <div class="field">
                <label>WhatsApp Principal</label>
                <input type="tel" id="pro-tel1" placeholder="809-000-0000">
            </div>
            <div class="field">
                <label>Teléfono Adicional</label>
                <input type="tel" id="pro-tel2" placeholder="829-000-0000">
            </div>
            <div class="full">
                <button class="btn-provider" onclick="app.grabar()">
                    Registrarme en la Red
                </button>
            </div>
        </div>
    </section>

    <section class="card full">
        <div class="card-header"><h2>📊 Resultados de la Red</h2></div>
        
        <div id="ai-response" class="ai-box">
            <span class="ai-badge">🤖 GEMINI IA ANALIZANDO</span>
            <div id="ai-text" class="ai-content"></div>
        </div>

        <div id="grid-resultados" class="results-grid"></div>
    </section>
</div>

<script>
    // LISTAS MASIVAS DE DATOS
    const PROVINCIAS = ["Azua", "Bahoruco", "Barahona", "Dajabón", "Distrito Nacional", "Duarte", "Elías Piña", "El Seibo", "Espaillat", "Hato Mayor", "Hermanas Mirabal", "Independencia", "La Altagracia", "La Romana", "La Vega", "María Trinidad Sánchez", "Monseñor Nouel", "Monte Cristi", "Monte Plata", "Pedernales", "Peravia", "Puerto Plata", "Samaná", "Sánchez Ramírez", "San Cristóbal", "San José de Ocoa", "San Juan", "San Pedro de Macorís", "Santiago", "Santiago Rodríguez", "Santo Domingo", "Valverde"];
    
    const AREAS = [
        "Abogado Civil", "Abogado Penalista", "Abogado Laboral", "Abogado de Familia", "Administrador de Condominios", "Albañil", "Alquiler de Equipos", "Alquiler de Vehículos", "Animador de Eventos", "Arquitecto", 
        "Arreglos Florales", "Asesor de Impuestos", "Asistente Virtual", "Auditor", "Barbero", "Bartender", "Bienes Raíces", "Cajeros", "Capitán de Camareros", "Carpintero", 
        "Cerrajería", "Chef a Domicilio", "Chófer Privado", "Clases de Inglés", "Clases de Matemáticas", "Clases de Música", "Clases de Baile", "Cocina Industrial", "Coach Personal", "Contador Publico", 
        "Cristalero", "Cuidador de Ancianos", "Cuidador de Niños (Niñera)", "Decorador de Interiores", "Dentista / Odontólogo", "Depilación", "Desabolladura y Pintura", "Diseñador Gráfico", "Diseñador de Modas", "Diseñador Web", 
        "Digitador", "Ebanista", "Electricista Residencial", "Electricista Industrial", "Electricista Automotriz", "Enfermería a Domicilio", "Entrenador Personal (Gym)", "Esteticista", "Especialista en Seguridad", "Exterminador / Fumigación", 
        "Fisioterapeuta", "Fotógrafo de Eventos", "Fotógrafo Comercial", "Gomero", "Guía Turístico", "Herrero", "Inmobiliaria", "Instalador de Cámaras (CCTV)", "Instalador de Inversores", "Instalador de Toldos", 
        "Jardinero", "Lavado de Alfombras", "Lavado de Muebles", "Lava Carros", "Limpieza de Piscinas", "Limpieza Profunda de Hogar", "Maquillista Profesional", "Masajista Terapéutico", "Mecánico de Gasolina", "Mecánico de Diesel", 
        "Mecánico de Motocicletas", "Mensajería / Delivery", "Modista / Sastre", "Montaje de Eventos", "Mudanzas y Acarreos", "Músico para Eventos", "Nutricionista", "Organizador de Bodas", "Organizador de Clóset", "Panadero / Pastelero", 
        "Peluquería", "Perito Eléctrico", "Pintor de Edificaciones", "Plomero / Fontanero", "Podólogo", "Programador de Apps", "Programador Web", "Psicólogo Clínico", "Psicólogo Infantil", "Publicidad y Mercadeo", 
        "Recogida de Escombros", "Reparación de Celulares", "Reparación de Computadoras", "Reparación de Estufas", "Reparación de Lavadoras", "Reparación de Neveras", "Reparación de Televisores", "Sastrería", "Secretaria Ejecutiva", "Seguridad Privada", 
        "Serigrafía", "Soporte Técnico IT", "Taller de Radiadores", "Tapicero", "Tatuador", "Técnico de Aire Acondicionado", "Traductor de Documentos", "Transporte Escolar", "Uñas Acrílicas (Manicurista)", "Veterinario", 
        "Vigilante", "Zapatero"
    ];

    const app = {
        proveedores: [],
        apiKey: "AIzaSyAoJfmj0DJVNRJsyCzvb4DAZWEWMpY1uVA", // TU CLAVE REAL

        init() {
            this.llenarListas();
            this.cargarDatosEjemplo();
            this.renderizar(this.proveedores);
        },

        llenarListas() {
            const selsP = [document.getElementById('cli-provincia'), document.getElementById('pro-provincia')];
            const selsA = [document.getElementById('cli-area'), document.getElementById('pro-area')];
            
            PROVINCIAS.sort().forEach(p => {
                selsP.forEach(s => s.add(new Option(p, p)));
            });

            AREAS.sort().forEach(a => {
                selsA.forEach(s => s.add(new Option(a, a)));
            });
        },

        grabar() {
            const nuevo = {
                nombre: document.getElementById('pro-nombre').value,
                provincia: document.getElementById('pro-provincia').value,
                area: document.getElementById('pro-area').value,
                direccion: document.getElementById('pro-dir').value,
                tel1: document.getElementById('pro-tel1').value,
                tel2: document.getElementById('pro-tel2').value
            };

            if(!nuevo.nombre || !nuevo.tel1) {
                return alert("Por favor, ingresa el nombre y al menos un teléfono de contacto.");
            }

            this.proveedores.unshift(nuevo);
            alert("¡Éxito! Tu servicio ha sido publicado en la red.");
            this.renderizar(this.proveedores);
        },

        async ejecutarBusquedaInteligente() {
            const prov = document.getElementById('cli-provincia').value;
            const area = document.getElementById('cli-area').value;
            const dir = document.getElementById('cli-dir').value;

            const resBox = document.getElementById('ai-response');
            const resText = document.getElementById('ai-text');

            resBox.style.display = 'block';
            resText.innerHTML = `<em>🤖 Analizando el mercado de ${area} en ${prov}...</em>`;

            // Filtrar locales primero
            const filtrados = this.proveedores.filter(p => p.provincia === prov && p.area === area);
            this.renderizar(filtrados);

            try {
                const prompt = `Actúa como el asistente inteligente de "Teencontre", una web de servicios en República Dominicana.
                Un cliente está buscando un "${area}" en la provincia de "${prov}". 
                Si conoce el sector "${dir}", úsalo para ser más específico.
                
                Instrucciones:
                1. Saluda cordialmente.
                2. Si hay proveedores en nuestra lista (hay ${filtrados.length}), menciónalos brevemente.
                3. Proporciona 2 o 3 recomendaciones de negocios REALES y famosos en esa zona de RD para este servicio (incluye nombres).
                4. Da un consejo útil sobre qué preguntar al contratar este servicio específico.
                5. Responde en un formato limpio con saltos de línea.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates) {
                    const respuestaLimpia = data.candidates.content.parts.text.replace(/\*/g, '');
                    resText.innerText = respuestaLimpia;
                } else {
                    resText.innerText = "La IA está procesando muchas solicitudes. Intenta de nuevo en un momento.";
                }

            } catch (error) {
                resText.innerText = "Lo siento, no pude conectar con el cerebro de la IA. Pero aquí abajo tienes los resultados de nuestra base de datos local.";
                console.error("Error IA:", error);
            }
        },

        renderizar(lista) {
            const cont = document.getElementById('grid-resultados');
            cont.innerHTML = lista.map(p => `
                <div class="result-item">
                    <h3>${p.nombre}</h3>
                    <div class="meta">🛠 ${p.area}</div>
                    <div class="meta">📍 ${p.provincia} - ${p.direccion}</div>
                    <a href="https://wa.me/1${p.tel1.replace(/-/g,'')}" target="_blank" class="contact-btn">
                        🟢 Contactar WhatsApp (${p.tel1})
                    </a>
                </div>
            `).join('') || `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
                    <p>No hay proveedores registrados manualmente en esta zona todavía.</p>
                    <p style="font-size: 0.8rem;">¡Utiliza la búsqueda con IA para obtener recomendaciones externas!</p>
                </div>
            `;
        },

        cargarDatosEjemplo() {
            this.proveedores = [
                { nombre: "Técnico Juan Aires", provincia: "Santo Domingo", area: "Técnico de Aire Acondicionado", direccion: "Ensanche Quisqueya", tel1: "809-555-1234" },
                { nombre: "Plomería El Rayo", provincia: "Santiago", area: "Plomero / Fontanero", direccion: "Los Jardines", tel1: "829-444-5566" },
                { nombre: "Abogados Asociados RD", provincia: "Distrito Nacional", area: "Abogado Civil", direccion: "Gazcue", tel1: "809-333-9988" }
            ];
        }
    };

    // INICIAR APLICACIÓN
    window.onload = () => app.init();
</script>

</body>
</html>
