<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teencontre | La Red Profesional Más Grande de RD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* SISTEMA DE DISEÑO AVANZADO */
        :root {
            --brand-blue: #0f172a;
            --brand-accent: #2563eb;
            --client-color: #6366f1;
            --ai-purple: #a855f7;
            --white: #ffffff;
            --bg-gray: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-gray); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* HEADER IMPACTANTE */
        header { 
            background: linear-gradient(135deg, var(--brand-blue) 0%, #1e293b 100%); 
            color: var(--white); 
            padding: 80px 20px; 
            text-align: center; 
            border-bottom: 5px solid var(--brand-accent);
            position: relative;
        }
        
        header h1 { font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 15px; }
        header p { font-size: 1.2rem; opacity: 0.8; font-weight: 300; max-width: 700px; margin: 0 auto; }

        /* LAYOUT PRINCIPAL */
        .main-layout { 
            max-width: 1300px; 
            margin: -50px auto 80px; 
            padding: 0 25px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 35px; 
        }

        .full-width { grid-column: span 2; }

        /* TARJETAS DE INTERFAZ */
        .card { 
            background: var(--white); 
            border-radius: var(--radius); 
            padding: 35px; 
            box-shadow: var(--shadow-lg); 
            border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { transform: translateY(-5px); }

        .card-header { 
            border-bottom: 2px solid #f1f5f9; 
            margin-bottom: 30px; 
            padding-bottom: 15px; 
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h2 { font-size: 1.5rem; font-weight: 700; color: var(--brand-blue); }

        /* FORMULARIOS EXPANDIDOS */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .field-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            background: #f8fafc; 
            font-size: 1rem; 
            transition: all 0.3s ease;
        }

        input:focus, select:focus { 
            border-color: var(--brand-accent); 
            outline: none; 
            background: white; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
        }
        
        /* BOTONES PROFESIONALES */
        .btn { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 1rem;
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.3s ease; 
            margin-top: 10px;
        }

        .btn-client { background: var(--client-color); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-provider { background: var(--brand-accent); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn:active { transform: scale(0.98); }

        /* MÓDULO DE IA DINÁMICO */
        .ai-container { 
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); 
            border-left: 8px solid var(--ai-purple); 
            padding: 30px; 
            border-radius: var(--radius); 
            margin-bottom: 35px; 
            display: none; 
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .ai-status-badge { 
            background: var(--ai-purple); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            display: inline-block;
            margin-bottom: 15px;
        }

        .ai-output-text { font-size: 1.05rem; color: #4c1d95; line-height: 1.8; white-space: pre-line; }

        /* REJILLA DE RESULTADOS */
        .results-wrapper { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
        
        .profile-card { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-top: 5px solid var(--brand-accent);
            padding: 30px; 
            border-radius: var(--radius); 
            position: relative;
            overflow: hidden;
        }

        .profile-card h3 { font-size: 1.3rem; margin-bottom: 10px; color: var(--brand-blue); }
        .profile-info { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        
        .whatsapp-link { 
            margin-top: 20px; 
            padding: 12px; 
            background: #22c55e; 
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 10px; 
            font-weight: 700;
        }

        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<header>
    <h1>Teencontre</h1>
    <p>Conectando el talento dominicano con soluciones inmediatas mediante Inteligencia Artificial.</p>
</header>

<div class="main-layout">
    <section class="card">
        <div class="card-header"><h2>🔍 Localizar Experto</h2></div>
        <div class="form-grid">
            <div class="field-group">
                <label>Provincia</label>
                <select id="search-provincia"></select>
            </div>
            <div class="field-group">
                <label>Servicio</label>
                <select id="search-area"></select>
            </div>
            <div class="full-width field-group">
                <label>Referencia de Ubicación</label>
                <input type="text" id="search-dir" placeholder="Ej: Av. Winston Churchill o Sector Naco">
            </div>
            <div class="full-width">
                <button class="btn btn-client" onclick="engine.runSmartSearch()">Consultar a la Red e IA</button>
            </div>
        </div>
    </section>

    <section class="card">
        <div class="card-header"><h2>💼 Unirme como Proveedor</h2></div>
        <div class="form-grid">
            <div class="full-width field-group">
                <label>Nombre Comercial / Profesional</label>
                <input type="text" id="reg-nombre" placeholder="Nombre que verán los clientes">
            </div>
            <div class="field-group">
                <label>Tu Provincia</label>
                <select id="reg-provincia"></select>
            </div>
            <div class="field-group">
                <label>Especialidad</label>
                <select id="reg-area"></select>
            </div>
            <div class="full-width field-group">
                <label>Dirección del Taller/Oficina</label>
                <input type="text" id="reg-dir" placeholder="Sector y número de calle">
            </div>
            <div class="field-group">
                <label>WhatsApp</label>
                <input type="tel" id="reg-tel1" placeholder="809-000-0000">
            </div>
            <div class="field-group">
                <label>Teléfono 2</label>
                <input type="tel" id="reg-tel2" placeholder="Opcional">
            </div>
            <div class="full-width">
                <button class="btn btn-provider" onclick="engine.saveProvider()">Publicar mi Perfil</button>
            </div>
        </div>
    </section>

    <section class="card full-width">
        <div class="card-header"><h2>📈 Resultados Localizados</h2></div>
        
        <div id="ai-panel" class="ai-container">
            <span class="ai-status-badge">🤖 GEMINI 1.5 FLASH ANALIZANDO</span>
            <div id="ai-content" class="ai-output-text"></div>
        </div>

        <div id="results-display" class="results-wrapper"></div>
    </section>
</div>

<script>
    // DATA CORE: PROVINCIAS Y 100+ SERVICIOS
    const DR_DATA = {
        provincias: ["Azua", "Bahoruco", "Barahona", "Dajabón", "Distrito Nacional", "Duarte", "Elías Piña", "El Seibo", "Espaillat", "Hato Mayor", "Hermanas Mirabal", "Independencia", "La Altagracia", "La Romana", "La Vega", "María Trinidad Sánchez", "Monseñor Nouel", "Monte Cristi", "Monte Plata", "Pedernales", "Peravia", "Puerto Plata", "Samaná", "Sánchez Ramírez", "San Cristóbal", "San José de Ocoa", "San Juan", "San Pedro de Macorís", "Santiago", "Santiago Rodríguez", "Santo Domingo", "Valverde"],
        servicios: [
            "Abogado Civil", "Abogado Penalista", "Administrador de Condominios", "Albañil", "Alquiler de Equipos", "Animador de Eventos", "Arquitecto", "Arreglos Florales", "Asesor de Impuestos", "Asistente Virtual",
            "Barbero", "Bartender", "Bienes Raíces", "Cajeros", "Capitán de Camareros", "Carpintero", "Cerrajería", "Chef a Domicilio", "Chófer Privado", "Clases de Inglés",
            "Clases de Matemáticas", "Clases de Música", "Cocina Industrial", "Coach Personal", "Contador Publico", "Cristalero", "Cuidador de Ancianos", "Cuidador de Niños (Niñera)", "Decorador de Interiores", "Dentista / Odontólogo",
            "Depilación", "Desabolladura y Pintura", "Diseñador Gráfico", "Diseñador de Modas", "Diseñador Web", "Digitador", "Ebanista", "Electricista Residencial", "Electricista Industrial", "Enfermería a Domicilio",
            "Entrenador Personal (Gym)", "Esteticista", "Especialista en Seguridad", "Exterminador / Fumigación", "Fisioterapeuta", "Fotógrafo de Eventos", "Fotógrafo Comercial", "Gomero", "Guía Turístico", "Herrero",
            "Inmobiliaria", "Instalador de Cámaras (CCTV)", "Instalador de Inversores", "Instalador de Toldos", "Jardinero", "Lavado de Alfombras", "Lavado de Muebles", "Lava Carros", "Limpieza de Piscinas", "Limpieza Profunda de Hogar",
            "Maquillista Profesional", "Masajista Terapéutico", "Mecánico de Gasolina", "Mecánico de Diesel", "Mecánico de Motocicletas", "Mensajería / Delivery", "Modista / Sastre", "Montaje de Eventos", "Mudanzas y Acarreos", "Músico para Eventos",
            "Nutricionista", "Organizador de Bodas", "Organizador de Clóset", "Panadero / Pastelero", "Peluquería", "Perito Eléctrico", "Pintor de Edificaciones", "Plomero / Fontanero", "Podólogo", "Programador de Apps",
            "Psicólogo Clínico", "Psicólogo Infantil", "Publicidad y Mercadeo", "Recogida de Escombros", "Reparación de Celulares", "Reparación de Computadoras", "Reparación de Estufas", "Reparación de Lavadoras", "Reparación de Neveras", "Reparación de Televisores",
            "Sastrería", "Secretaria Ejecutiva", "Seguridad Privada", "Serigrafía", "Soporte Técnico IT", "Taller de Radiadores", "Tapicero", "Tatuador", "Técnico de Aire Acondicionado", "Traductor de Documentos",
            "Transporte Escolar", "Uñas Acrílicas (Manicurista)", "Veterinario", "Vigilante", "Zapatero"
        ]
    };

    const engine = {
        database: [],
        key: "AIzaSyAoJfmj0DJVNRJsyCzvb4DAZWEWMpY1uVA", // CLAVE DEL USUARIO [cite: 90, 91]

        init() {
            this.buildMenus();
            this.seedData();
            this.renderProfiles(this.database);
        },

        buildMenus() {
            const pSelects = [document.getElementById('search-provincia'), document.getElementById('reg-provincia')];
            const aSelects = [document.getElementById('search-area'), document.getElementById('reg-area')];
            
            DR_DATA.provincias.sort().forEach(p => pSelects.forEach(s => s.add(new Option(p, p))));
            DR_DATA.servicios.sort().forEach(a => aSelects.forEach(s => s.add(new Option(a, a))));
        },

        saveProvider() {
            const entry = {
                nombre: document.getElementById('reg-nombre').value,
                provincia: document.getElementById('reg-provincia').value,
                area: document.getElementById('reg-area').value,
                direccion: document.getElementById('reg-dir').value,
                tel1: document.getElementById('reg-tel1').value,
                tel2: document.getElementById('reg-tel2').value
            };

            if(!entry.nombre || !entry.tel1) return alert("Nombre y Teléfono son obligatorios para publicar.");
            
            this.database.unshift(entry);
            alert("¡Perfil publicado! Ahora apareces en las búsquedas.");
            this.renderProfiles(this.database);
        },

        async runSmartSearch() {
            const p = document.getElementById('search-provincia').value;
            const a = document.getElementById('search-area').value;
            const d = document.getElementById('search-dir').value;

            const aiPanel = document.getElementById('ai-panel');
            const aiText = document.getElementById('ai-content');

            aiPanel.style.display = 'block';
            aiText.innerHTML = `<em>🤖 Conectando con los satélites de información en ${p}...</em>`;

            // Filtrado local inmediato [cite: 92, 93]
            const matches = this.database.filter(item => item.provincia === p && item.area === a);
            this.renderProfiles(matches);

            try {
                const instructions = `Eres Teencontre-AI. Un cliente en República Dominicana busca un "${a}" en "${p}". 
                Contexto adicional: "${d}". 
                1. Saluda.
                2. Nombra 3 negocios reales y populares que ofrezcan ese servicio en esa provincia específica de RD.
                3. Da un consejo de seguridad para el cliente.
                Respuesta corta y profesional en español.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: instructions }] }] })
                });

                const json = await response.json();
                
                // CORRECCIÓN CRÍTICA DE LÓGICA DE RESPUESTA 
                if (json.candidates && json.candidates.content) {
                    aiText.innerText = json.candidates.content.parts.text;
                } else {
                    aiText.innerText = "He analizado la red, pero no hay recomendaciones externas en este momento. Prueba con otra provincia cercana.";
                }

            } catch (err) {
                aiText.innerText = "Error de conexión con la IA. Mostrando solo base de datos local.";
                console.error(err);
            }
        },

        renderProfiles(list) {
            const box = document.getElementById('results-display');
            box.innerHTML = list.map(user => `
                <div class="profile-card">
                    <h3>${user.nombre}</h3>
                    <div class="profile-info"><strong>🛠 Área:</strong> ${user.area}</div>
                    <div class="profile-info"><strong>📍 Ubicación:</strong> ${user.provincia} - ${user.direccion}</div>
                    <a href="https://wa.me/1${user.tel1.replace(/-/g,'')}" target="_blank" class="whatsapp-link">
                        Enviar WhatsApp (${user.tel1})
                    </a>
                </div>
            `).join('') || `<p style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.6;">No se encontraron registros manuales. Usa la IA para buscar negocios externos.</p>`;
        },

        seedData() {
            this.database = [
                { nombre: "Mecánica RD Express", provincia: "Distrito Nacional", area: "Mecánico de Gasolina", direccion: "Ensanche La Fe", tel1: "809-555-0101", tel2: "" },
                { nombre: "Pedro Aire Frío", provincia: "Santo Domingo", area: "Técnico de Aire Acondicionado", direccion: "Ensanche La Paz", tel1: "809-555-0011", tel2: "" },
                { nombre: "Lic. García & Asoc.", provincia: "Distrito Nacional", area: "Abogado Civil", direccion: "Gazcue", tel1: "829-444-1122", tel2: "" }
            ];
        }
    };

    window.onload = () => engine.init();
</script>

</body>
</html>
