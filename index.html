<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teencontre | 100+ Servicios Profesionales RD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0f172a;
            --brand-accent: #2563eb;
            --client-color: #6366f1;
            --ai-purple: #a855f7;
            --white: #ffffff;
            --bg-gray: #f1f5f9;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-gray); color: var(--brand-blue); line-height: 1.6; }

        header { background: var(--brand-blue); color: var(--white); padding: 40px 20px; text-align: center; }
        .main-layout { max-width: 1300px; margin: -30px auto 60px; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .full { grid-column: span 2; }

        .card { background: var(--white); border-radius: 16px; padding: 25px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.05); }
        .card-header { border-bottom: 2px solid var(--bg-gray); margin-bottom: 20px; padding-bottom: 10px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; font-size: 0.9rem; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-client { background: var(--client-color); color: white; }
        .btn-provider { background: var(--brand-accent); color: white; }

        .ai-box { background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); border-left: 5px solid var(--ai-purple); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .ai-badge { background: var(--ai-purple); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .result-item { background: white; border: 1px solid #eef2ff; border-left: 5px solid var(--brand-accent); padding: 20px; border-radius: 12px; }
        
        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<header>
    <h1>Teencontre</h1>
    <p>Conexión Profesional Inmediata en República Dominicana</p>
</header>

<div class="main-layout">
    <section class="card">
        <div class="card-header"><h2>🔎 Buscar un Servicio</h2></div>
        <div class="form-grid">
            <div><label>Provincia</label><select id="cli-provincia"></select></div>
            <div><label>Categoría</label><select id="cli-area"></select></div>
            <div class="full"><label>Dirección o Sector Específico</label><input type="text" id="cli-dir" placeholder="Ej: Av. Winston Churchill / Ensanche Naco"></div>
            <div class="full"><button class="btn-client" onclick="app.ejecutarBusquedaInteligente()">Buscar Solicitud</button></div>
        </div>
    </section>

    <section class="card">
        <div class="card-header"><h2>🛠 Ofrecer mi Servicio</h2></div>
        <div class="form-grid">
            <div class="full"><label>Nombre del Profesional / Negocio</label><input type="text" id="pro-nombre" placeholder="Nombre completo"></div>
            <div><label>Provincia</label><select id="pro-provincia"></select></div>
            <div><label>Área</label><select id="pro-area"></select></div>
            <div class="full"><label>Dirección / Sector de Trabajo</label><input type="text" id="pro-dir" placeholder="Ej: Calle 4ta, Los Mina / Herrera"></div>
            <div><label>WhatsApp / Tel 1</label><input type="tel" id="pro-tel1" placeholder="809-000-0000"></div>
            <div><label>Teléfono 2</label><input type="tel" id="pro-tel2" placeholder="829-000-0000"></div>
            <div class="full"><button class="btn-provider" onclick="app.grabar()">Grabar y Publicar</button></div>
        </div>
    </section>

    <section class="card full">
        <div class="card-header"><h2>📊 Servicio Localizado</h2></div>
        
        <div id="ai-response" class="ai-box">
            <span class="ai-badge">🤖 ASISTENTE IA</span>
            <p id="ai-text" style="margin-top:10px; font-size: 0.95rem; color: #4c1d95; white-space: pre-line;"></p>
        </div>

        <div id="grid-resultados" class="results-grid"></div>
    </section>
</div>

<script>
    const PROVINCIAS = ["Azua", "Bahoruco", "Barahona", "Dajabón", "Distrito Nacional", "Duarte", "Elías Piña", "El Seibo", "Espaillat", "Hato Mayor", "Hermanas Mirabal", "Independencia", "La Altagracia", "La Romana", "La Vega", "María Trinidad Sánchez", "Monseñor Nouel", "Monte Cristi", "Monte Plata", "Pedernales", "Peravia", "Puerto Plata", "Samaná", "Sánchez Ramírez", "San Cristóbal", "San José de Ocoa", "San Juan", "San Pedro de Macorís", "Santiago", "Santiago Rodríguez", "Santo Domingo", "Valverde"];
    
    const AREAS = [
        "Abogado Civil", "Abogado Penalista", "Administrador de Condominios", "Albañil", "Alquiler de Equipos", "Animador de Eventos", "Arquitecto", "Arreglos Florales", "Asesor de Impuestos", "Asistente Virtual",
        "Barbero", "Bartender", "Bienes Raíces", "Cajeros", "Capitán de Camareros", "Carpintero", "Cerrajería", "Chef a Domicilio", "Chófer Privado", "Clases de Inglés",
        "Clases de Matemáticas", "Clases de Música", "Cocina Industrial", "Coach Personal", "Contador Publico", "Cristalero", "Cuidador de Ancianos", "Cuidador de Niños (Niñera)", "Decorador de Interiores", "Dentista / Odontólogo",
        "Depilación", "Desabolladura y Pintura", "Diseñador Gráfico", "Diseñador de Modas", "Diseñador Web", "Digitador", "Ebanista", "Electricista Residencial", "Electricista Industrial", "Enfermería a Domicilio",
        "Entrenador Personal (Gym)", "Esteticista", "Especialista en Seguridad", "Exterminador / Fumigación", "Fisioterapeuta", "Fotógrafo de Eventos", "Fotógrafo Comercial", "Gomero", "Guía Turístico", "Herrero",
        "Inmobiliaria", "Instalador de Cámaras (CCTV)", "Instalador de Inversores", "Instalador de Toldos", "Jardinero", "Lavado de Alfombras", "Lavado de Muebles", "Lava Carros", "Limpieza de Piscinas", "Limpieza Profunda de Hogar",
        "Maquillista Profesional", "Masajista Terapéutico", "Mecánico de Gasolina", "Mecánico de Diesel", "Mecánico de Motocicletas", "Mensajería / Delivery", "Modista / Sastre", "Montaje de Eventos", "Mudanzas y Acarreos", "Músico para Eventos",
        "Nutricionista", "Organizador de Bodas", "Organizador de Clóset", "Panadero / Pastelero", "Peluquería", "Perito Eléctrico", "Pintor de Edificaciones", "Plomero / Fontanero", "Podólogo", "Programador de Apps",
        "Psicólogo Clínico", "Psicólogo Infantil", "Publicidad y Mercadeo", "Recogida de Escombros", "Reparación de Celulares", "Reparación de Computadoras", "Reparación de Estufas", "Reparación de Lavadoras", "Reparación de Neveras", "Reparación de Televisores",
        "Sastrería", "Secretaria Ejecutiva", "Seguridad Privada", "Serigrafía", "Soporte Técnico IT", "Taller de Radiadores", "Tapicero", "Tatuador", "Técnico de Aire Acondicionado", "Traductor de Documentos",
        "Transporte Escolar", "Uñas Acrílicas (Manicurista)", "Veterinario", "Vigilante", "Zapatero"
    ];

    const app = {
        proveedores: [],

        init() {
            this.llenarListas();
            this.cargarDatosEjemplo();
            this.renderizar(this.proveedores);
        },

        llenarListas() {
            const selsP = [document.getElementById('cli-provincia'), document.getElementById('pro-provincia')];
            const selsA = [document.getElementById('cli-area'), document.getElementById('pro-area')];
            PROVINCIAS.sort().forEach(p => selsP.forEach(s => s.add(new Option(p, p))));
            AREAS.sort().forEach(a => selsA.forEach(s => s.add(new Option(a, a))));
        },

        grabar() {
            const nuevo = {
                nombre: document.getElementById('pro-nombre').value,
                provincia: document.getElementById('pro-provincia').value,
                area: document.getElementById('pro-area').value,
                direccion: document.getElementById('pro-dir').value,
                tel1: document.getElementById('pro-tel1').value,
                tel2: document.getElementById('pro-tel2').value
            };
            if(!nuevo.nombre || !nuevo.tel1) return alert("Nombre y Teléfono son obligatorios");
            this.proveedores.unshift(nuevo);
            alert("¡Perfil guardado correctamente!");
            this.renderizar(this.proveedores);
        },

        async function ejecutarBusquedaInteligente() {
    const prov = document.getElementById('cli-provincia').value;
    const area = document.getElementById('cli-area').value;
    const API_KEY = "AIzaSyAoJfmj0DJVNRJsyCzvb4DAZWEWMpY1uVA"; 

    const resBox = document.getElementById('ai-response');
    const resText = document.getElementById('ai-text');

    resBox.style.display = 'block';
    resText.innerText = "🤖 La IA está buscando expertos en " + prov + "...";

    const filtrados = this.proveedores.filter(p => p.provincia === prov && p.area === area);
    this.renderizar(filtrados);

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ 
                    parts: [{ 
                        text: `Eres el asistente de la web Teencontre. Un cliente busca "${area}" en la provincia de "${prov}", República Dominicana. Sugiere 2 o 3 negocios reales con buena reputación en esa zona de RD.` 
                    }] 
                }]
            })
        });

        const data = await response.json();
        
        // ESTA ES LA LÍNEA CORREGIDA:
        if (data.candidates && data.candidates) {
            const textoIA = data.candidates.content.parts.text;
            resText.innerText = textoIA;
        } else {
            resText.innerText = "La IA no pudo encontrar sugerencias externas en este momento.";
        }

    } catch (error) {
        resText.innerText = "Error de conexión. Mostrando solo resultados locales.";
        console.error(error);
    }
}

        renderizar(lista) {
            const cont = document.getElementById('grid-resultados');
            cont.innerHTML = lista.map(p => `
                <div class="result-item">
                    <h3>${p.nombre}</h3>
                    <p style="font-size:0.85rem; color:#64748b;">🛠 ${p.area}</p>
                    <p style="font-size:0.85rem; color:#64748b;">📍 ${p.provincia} - ${p.direccion}</p>
                    <div style="margin-top:10px; color:var(--brand-accent); font-weight:700;">
                        📞 ${p.tel1} ${p.tel2 ? ' / ' + p.tel2 : ''}
                    </div>
                </div>
            `).join('') || '<p style="grid-column:1/-1; text-align:center; padding:20px; opacity:0.5;">No hay proveedores registrados todavía en esta zona.</p>';
        },

        cargarDatosEjemplo() {
            this.proveedores = [
                { nombre: "Pedro Aire Frío", provincia: "Santo Domingo", area: "Técnico de Aire Acondicionado", direccion: "Ensanche La Paz", tel1: "809-555-0011", tel2: "" },
                { nombre: "Lic. García & Asoc.", provincia: "Distrito Nacional", area: "Abogado Civil", direccion: "Gazcue", tel1: "829-444-1122", tel2: "" },
                { nombre: "Reparaciones Express", provincia: "Santiago", area: "Reparación de Celulares", direccion: "Calle del Sol", tel1: "809-222-3344", tel2: "" }
            ];
        }
    };

    window.onload = () => app.init();
</script>

</body>
</html>
